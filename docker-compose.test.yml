services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.test
    container_name: laravel_app_test
    volumes:
      - .:/var/www
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=laravel_test
      - DB_USERNAME=test
      - DB_PASSWORD=test

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=laravel_test
      - POSTGRES_USER=test
      - POSTGRES_PASSWORD=test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d laravel_test"]
      interval: 5s
      timeout: 5s
      retries: 5
