services:
  app:
    build:
      context: .
      target: prod
      dockerfile: docker/php/Dockerfile
    container_name: laravel_app_prod
    restart: unless-stopped
    #environment:
    #  - APP_ENV=production
    #  - APP_DEBUG=false
    env_file:
      - .env
    volumes:
      - laravel_public:/var/www/public
    networks:
      - prod_net

  web:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile.prod
    container_name: laravel_nginx_prod
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - laravel_public:/var/www/public:ro
    #  - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt/archive/server1.fabriciolr.online:/etc/nginx/cert:ro
    depends_on:
      - app
    networks:
      - prod_net

networks:
  prod_net:
    driver: bridge

volumes:
  laravel_public:
